  <title>Chat</title>

</head>
<body>

  <div class="chat-container">

  <!-- Lista de conversas -->
  <aside class="chat-sidebar">
    <h3>Menu</h3>
    <nav class="sidebar-menu" aria-label="Menu lateral">
      <a href="/index/index.html#inicio">Início</a>
      <a href="/index/index.html#sobre">Sobre</a>
      <a href="/index/index.html#programacao">Programação</a>
      <a href="/index/index.html#localizacao">Localização</a>
    </nav>
  </aside>

  <!-- Área do chat -->
  <main class="chat-main">

    <!-- Header -->
    <div class="chat-header">
      <strong id="nomeChat">Chat Geral</strong>
    </div>

    <!-- Mensagens -->
    <div class="chat-messages" id="chat">
      <!-- mensagens entram aqui -->
    </div>

    <!-- Input -->
    <div class="chat-input-wrapper">
      <div class="chat-input">
        <input 
          type="text" 
          id="mensagem" 
          placeholder="Digite uma mensagem..."
          onkeypress="if(event.key === 'Enter') enviar()"
        >
        <button onclick="enviar()">➤</button>
      </div>

      <!-- Caminho da imagem para você substituir manualmente -->
  
    </div>

  </main>

</div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>
  if (!localStorage.getItem("usuario")) {
    window.location.href = "login.html";
  }

  const input = document.getElementById("mensagem");
  input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    enviar();
  }
});

  const socket = io("http://localhost:3000");
  const chat = document.getElementById("chat");
  const usuarioAtual = localStorage.getItem("usuario");

  // carregar histórico
  async function carregarMensagens() {
    const res = await fetch("http://localhost:3000/mensagens");
    const dados = await res.json();

    chat.innerHTML = "";

    dados.forEach(msg => {
      adicionarMensagem(
        msg.usuario,
        msg.mensagem ?? msg.texto ?? "",
        formatarHora(msg.hora, msg.data_envio)
      );
    });

    scrollFinal();
  }

  // adicionar mensagem (AGORA COM ESTILO)
  function formatarHora(hora, dataEnvio) {
  const formatarDataHora = (data) => {
      const dataFormatada = data.toLocaleDateString("pt-BR");
      const horaFormatada = data.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      return `${dataFormatada} ${horaFormatada}`;
    };

    if (dataEnvio) {
      const data = new Date(dataEnvio);
      if (!Number.isNaN(data.getTime())) {
        return formatarDataHora(data);
      }
  }

  if (hora && hora !== "null") {
      const [h, m] = String(hora).split(":");
      if (h && m) return `${h.padStart(2, "0")}:${m.padStart(2, "0")}`;
      return String(hora);
    }

  const agora = new Date();
  if (!Number.isNaN(agora.getTime())) {
    return formatarDataHora(agora);
  }

  return "--/--/---- --:--";

  }

function adicionarMensagem(usuario, texto, hora) {
  const div = document.createElement("div");

  const tipo = usuario === usuarioAtual ? "enviada" : "recebida";

  div.classList.add("msg", tipo);

  div.innerHTML = `
    ${usuario !== usuarioAtual ? `<strong>${usuario}</strong><br>` : ""}
    ${texto}
    <span>${hora || "--:--"}</span>
  `;

  chat.appendChild(div);
}

  // enviar mensagem
function enviar() {
  

  const texto = input.value;
  const usuario = usuarioAtual;

  if (!texto) return;

  socket.emit("mensagem", { usuario, texto });

  input.value = "";
}

  // receber mensagem em tempo real
  socket.on("mensagem", (msg) => {
     adicionarMensagem(
      msg.usuario,
      msg.texto ?? msg.mensagem ?? "",
      formatarHora(msg.hora, msg.data_envio)
    );
    scrollFinal();
  });

  // scroll automático
  function scrollFinal() {
    chat.scrollTop = chat.scrollHeight;
  }

  // carregar histórico ao abrir
  carregarMensagens();
</script>
</body>
</html>
